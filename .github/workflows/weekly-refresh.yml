# PHASE 2 — Weekly auto-refresh from Flight.
#
# Disabled until Flight credentials are saved as repo secrets and the
# scripts/flight_export.py Playwright flow is implemented & tested.
#
# To enable:
#   1. Repo Settings → Secrets and variables → Actions → add:
#        FLIGHT_USERNAME
#        FLIGHT_PASSWORD
#   2. Finish the TODOs in scripts/flight_export.py
#   3. Remove the `if: false` line below
#
# This workflow pulls fresh exports from Flight, rebuilds docs/index.html,
# and commits the result. GitHub Pages (configured to serve /docs on main)
# picks up the new file automatically.

name: Weekly refresh from Flight

on:
  schedule:
    # Every Monday at 10:00 UTC (≈ 3am PT / 5am CT). Adjust as desired.
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    if: false  # <-- remove this line when Phase 2 is ready
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit docs/ back to main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium

      - name: Pull fresh exports from Flight
        env:
          FLIGHT_USERNAME: ${{ secrets.FLIGHT_USERNAME }}
          FLIGHT_PASSWORD: ${{ secrets.FLIGHT_PASSWORD }}
        run: python scripts/flight_export.py

      - name: Build data + HTML
        run: |
          python scripts/build_data.py
          python scripts/build_artifact.py

      - name: Commit updated docs/
        run: |
          git config user.name  "flight-refresh-bot"
          git config user.email "flight-refresh-bot@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly refresh $(date -u +'%Y-%m-%d')"
            git push
          fi
